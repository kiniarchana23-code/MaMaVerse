steps:
  # ─── Backend Container Build & Push ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--no-cache',
      '-t', 'gcr.io/$PROJECT_ID/mamaverse-backend:latest',
      './backend'
    ]
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mamaverse-backend:latest']
    id: 'push-backend-latest'

  # ─── Deploy to Google Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'mamaverse-backend',
      '--image', 'gcr.io/$PROJECT_ID/mamaverse-backend:latest',
      '--region', 'asia-south1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--set-env-vars', 'FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID,GEMINI_API_KEY=$_GEMINI_API_KEY,GOOGLE_PLACES_API_KEY=$_GOOGLE_PLACES_API_KEY,GCP_PROJECT_ID=$PROJECT_ID'
    ]
    id: 'deploy-backend'
  # ─── Frontend Container Build & Push ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--no-cache',
      '--build-arg', 'NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID',
      '-t', 'gcr.io/$PROJECT_ID/mamaverse-frontend:latest',
      './frontend'
    ]
    id: 'build-frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mamaverse-frontend:latest']
    id: 'push-frontend-latest'

  # ─── Deploy Frontend to Google Cloud Run ────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'mamaverse-frontend',
      '--image', 'gcr.io/$PROJECT_ID/mamaverse-frontend:latest',
      '--region', 'asia-south1',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]
    id: 'deploy-frontend'

images:
  - 'gcr.io/$PROJECT_ID/mamaverse-backend:latest'
  - 'gcr.io/$PROJECT_ID/mamaverse-frontend:latest'

