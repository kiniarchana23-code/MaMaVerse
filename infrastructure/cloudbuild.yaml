steps:
  # ─── Backend Container Build & Push ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/mamaverse-backend:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/mamaverse-backend:latest',
      './backend'
    ]
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mamaverse-backend:$COMMIT_SHA']
    id: 'push-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mamaverse-backend:latest']
    id: 'push-backend-latest'

  # ─── Deploy to Google Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'mamaverse-backend',
      '--image', 'gcr.io/$PROJECT_ID/mamaverse-backend:$COMMIT_SHA',
      '--region', 'asia-south1',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]
    id: 'deploy-backend'

images:
  - 'gcr.io/$PROJECT_ID/mamaverse-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mamaverse-backend:latest'
